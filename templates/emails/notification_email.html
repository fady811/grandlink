<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }} — GradLink</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #0f172a;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #1e293b;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gradient-top {
            height: 6px;
            background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .content {
            padding: 0 40px 40px;
            text-align: center;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .action-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }

        .footer {
            padding: 32px;
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
        }

        .footer p {
            font-size: 12px;
            margin: 0;
            color: #64748b;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #6366f1;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="gradient-top"></div>
            <div class="header">
                <div class="logo">GradLink</div>
            </div>
            <div class="content">
                <h2>New Notification</h2>
                <div class="action-box">
                    <p style="color: #ffffff; margin-bottom: 0;">{{ message }}</p>
                </div>
                <a href="{{ site_url }}" class="btn">View on Platform</a>
            </div>
            <div class="footer">
                <p>&copy; 2026 GradLink Inc.</p>
                <p style="margin-top: 8px;">The premier platform for career growth.</p>
            </div>
        </div>
    </div>
</body>

</html>
